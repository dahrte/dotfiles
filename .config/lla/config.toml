# lla Configuration File
# This file controls the behavior and appearance of the lla command

default_sort = "name"
default_format = "long"
show_icons = true
include_dirs = false
permission_format = "symbolic"
theme = "catppuccin_mocha"
enabled_plugins = []
plugins_dir = "~/.config/lla/plugins"
exclude_paths = []
default_depth = 3

# Sorting configuration
[sort]
dirs_first = true
case_sensitive = false
natural = true

# Filtering configuration
[filter]
case_sensitive = false
no_dotfiles = false
respect_gitignore = true

# Formatter-specific configurations
[formatters.tree]
max_lines = 20000

# Grid formatter configuration
[formatters.grid]
ignore_width = false
max_width = 200

# Long formatter configuration
[formatters.long]
hide_group = false
relative_dates = true
columns = ["permissions", "size", "modified", "user", "group", "name"]

# Table formatter configuration
[formatters.table]
columns = ["permissions", "size", "modified", "name"]

# Lister-specific configurations
[listers.recursive]
max_entries = 20000

# Fuzzy lister configuration
[listers.fuzzy]
ignore_patterns = ["node_modules", "target", ".git", ".idea", ".vscode"]
editor = ""
